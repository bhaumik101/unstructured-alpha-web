<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1e2c"/>
      <stop offset="100%" stop-color="#0b0d12"/>
    </radialGradient>
    <linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d566"/>
      <stop offset="100%" stop-color="#00c8e0"/>
    </linearGradient>
    <clipPath id="circle-clip">
      <circle cx="100" cy="100" r="96"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="rgba(0,213,102,0.25)" stroke-width="1.5"/>

  <!-- U letter (white) -->
  <text x="52" y="118" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800"
        fill="#ffffff" letter-spacing="-2">U</text>

  <!-- A letter (cyan-green gradient) -->
  <text x="100" y="118" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800"
        fill="url(#aGrad)" letter-spacing="-2">A</text>

  <!-- Heartbeat / pulse line -->
  <polyline
    points="18,155 36,155 44,138 52,172 60,130 68,165 76,155 124,155 132,138 140,165 148,145 156,155 182,155"
    fill="none" stroke="url(#aGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
    clip-path="url(#circle-clip)"
  />
</svg>
