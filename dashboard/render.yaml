# Render Blueprint for Unstructured Alpha.
#
# This defines the web service so Render's dashboard can pick it up
# automatically ("New +" -> "Blueprint", point it at this GitHub repo).
# Secrets are listed by NAME only (sync: false) -- Render will prompt you
# to type each value into its dashboard once, encrypted at rest there. None
# of the actual values live in this file or in git, same principle as
# .streamlit/secrets.toml being gitignored.
#
# Why a Python native environment, not Docker: this app has no system-level
# dependencies beyond what's in requirements.txt (psycopg2-binary ships
# precompiled wheels, so no Postgres client headers needed at build time).
# Docker would just add an extra layer with nothing to abstract here.
#
# --server.port $PORT --server.address 0.0.0.0 is required specifically
# because Render assigns the listen port dynamically via the $PORT env var
# and proxies external traffic to it -- Streamlit's default
# (localhost:8501) would never receive that traffic.
#
# rootDir: dashboard -- required because this repo's actual root (where
# .git lives) is the PARENT of this dashboard/ folder, not this folder
# itself (confirmed live: Render's Blueprint creation flow couldn't find
# requirements.txt/app.py without this, since buildCommand/startCommand
# otherwise execute relative to the repo root, not wherever render.yaml
# happens to sit).

services:
  - type: web
    name: unstructured-alpha
    runtime: python
    plan: starter  # always-on, no cold start
    rootDir: dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      # Stripe — required for Upgrade page, checkout, billing portal, and referral rewards
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_ANNUAL_PRICE_ID
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      # Referral link base URL — Render sets this automatically to the service's public URL.
      # If left unset, referral.py falls back to http://localhost:8501 (wrong in production).
      - key: RENDER_EXTERNAL_URL
        sync: false
      # Anthropic — used by utils/fetchers.py for earnings transcript sentiment scoring
      - key: ANTHROPIC_API_KEY
        sync: false

  # Morning digest cron job — runs at 07:00 ET (12:00 UTC) daily.
  # Scores all signals, detects flips, emails opted-in users.
  # Uses the same DATABASE_URL / RESEND_* env vars as the web service.
  - type: cron
    name: unstructured-alpha-digest
    runtime: python
    rootDir: dashboard
    schedule: "0 12 * * *"   # 12:00 UTC = 07:00 ET (UTC-5 winter) / 08:00 EDT
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_digest
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Day-6 trial-end reminder cron — runs at 10:00 ET (15:00 UTC) daily.
  # Finds Pro users whose 7-day trial ends within the next 20–32 hours
  # and emails them a "trial ends tomorrow" nudge.
  - type: cron
    name: unstructured-alpha-trial-reminder
    runtime: python
    rootDir: dashboard
    schedule: "0 15 * * *"   # 15:00 UTC = 10:00 ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_trial_reminder
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false

  # Webhook alert cron — runs every hour.
  # For every user with a Discord/Slack/generic webhook URL configured,
  # evaluates their watchlist and fires any threshold crossings to their
  # webhook. Duplicate-safe: the alert state table prevents re-firing the
  # same crossing more than once. Only needs DATABASE_URL + the signal data
  # APIs (FRED/EIA) — no email sending.
  - type: cron
    name: unstructured-alpha-webhooks
    runtime: python
    rootDir: dashboard
    schedule: "0 * * * *"   # every hour on the hour
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.fire_webhooks
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Watchlist email alert cron — runs every hour (offset 30 min from webhooks).
  # For every verified user with at least one watchlist entry, evaluates their
  # watchlist and emails them about any threshold crossings. Covers users who
  # have no Discord/Slack webhook configured but still want push notifications.
  # Duplicate-safe: same alert_state table dedup as fire_webhooks.py.
  - type: cron
    name: unstructured-alpha-watchlist-alerts
    runtime: python
    rootDir: dashboard
    schedule: "30 * * * *"   # every hour at :30 (offset from webhook cron)
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_watchlist_alerts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Nightly prediction auto-resolution cron — runs at 02:00 UTC daily.
  # Finds pending predictions whose 4w/8w/12w forward windows have expired,
  # fetches realized prices via yfinance, and marks them correct/incorrect.
  # This powers the public Track Record leaderboard and per-signal accuracy stats.
  - type: cron
    name: unstructured-alpha-resolve-predictions
    runtime: python
    rootDir: dashboard
    schedule: "0 2 * * *"   # 02:00 UTC = 10:00 PM ET (runs overnight, off-peak)
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.resolve_predictions
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Score-movement email cron — runs once daily at 15:30 UTC (11:30 AM ET).
  # For every verified watchlist user, computes current Confluence Score for each
  # watched ticker and compares against last_score_emailed in alert_state. Any
  # ticker that moved ±10+ points since the last emailed baseline triggers a
  # batched notification email. Baseline is updated after each alert so subsequent
  # checks measure movement from the new level, not the original one. First-run
  # for a ticker sets the baseline silently with no email.
  - type: cron
    name: unstructured-alpha-score-moved
    runtime: python
    rootDir: dashboard
    schedule: "30 15 * * *"   # 15:30 UTC = 11:30 AM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_score_moved
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Twitter/X signal-flip tweet cron — runs once daily at 13:00 UTC (9:00 AM ET).
  # Computes the current macro signal state, detects flips since yesterday, and
  # tweets a briefing via @UnstructuredAlpha. Requires Twitter API v2 credentials
  # (OAuth 1.0a user context) set as Render env vars — never commit key values.
  - type: cron
    name: unstructured-alpha-tweet-flips
    runtime: python
    rootDir: dashboard
    schedule: "0 13 * * *"   # 13:00 UTC = 09:00 ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.tweet_signal_flips
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_TOKEN_SECRET
        sync: false
