# Render Blueprint for Unstructured Alpha.
#
# This defines the web service so Render's dashboard can pick it up
# automatically ("New +" -> "Blueprint", point it at this GitHub repo).
# Secrets are listed by NAME only (sync: false) -- Render will prompt you
# to type each value into its dashboard once, encrypted at rest there. None
# of the actual values live in this file or in git, same principle as
# .streamlit/secrets.toml being gitignored.
#
# Why a Python native environment, not Docker: this app has no system-level
# dependencies beyond what's in requirements.txt (psycopg2-binary ships
# precompiled wheels, so no Postgres client headers needed at build time).
# Docker would just add an extra layer with nothing to abstract here.
#
# --server.port $PORT --server.address 0.0.0.0 is required specifically
# because Render assigns the listen port dynamically via the $PORT env var
# and proxies external traffic to it -- Streamlit's default
# (localhost:8501) would never receive that traffic.
#
# rootDir: dashboard -- required because this repo's actual root (where
# .git lives) is the PARENT of this dashboard/ folder, not this folder
# itself (confirmed live: Render's Blueprint creation flow couldn't find
# requirements.txt/app.py without this, since buildCommand/startCommand
# otherwise execute relative to the repo root, not wherever render.yaml
# happens to sit).

services:
  - type: web
    name: unstructured-alpha
    runtime: python
    plan: standard  # 2GB RAM / 1 CPU — 4x the Starter RAM ceiling, ends OOM headroom
                    # concerns. Blueprint-managed: THIS line governs the instance
                    # type (a dashboard-side change gets reverted on sync), so the
                    # plan must be set here. always-on, no cold start.
    rootDir: dashboard
    # inject_boot_splash: patch Streamlit's served index.html with an on-brand dark
    # loader so the pre-boot JS-download window shows a branded splash instead of a
    # blank screen. Defensive + idempotent; can never fail the build (always exits 0).
    buildCommand: pip install -r requirements.txt && python scripts/inject_boot_splash.py
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    # Liveness-only check — Streamlit's built-in health endpoint (returns 200
    # "ok" when the server is up). Deliberately NOT a DB/provider-dependent path,
    # so a data-store or provider outage can't trigger a restart loop.
    healthCheckPath: /_stcore/health
    envVars:
      # glibc malloc arena cap. Kept at "2" on Standard (2GB / 1 CPU): with a
      # single CPU there is no arena-contention to relieve, so raising it gives
      # no throughput benefit and only grows RSS — keep it lean. Only worth
      # raising (to ~8) on a genuinely multi-core plan (Pro Plus+). Pairs with
      # utils/memory.release_memory()'s malloc_trim.
      - key: MALLOC_ARENA_MAX
        value: "2"
      # BLAS / numeric thread caps. On a single-CPU (Standard) box, numpy/pandas
      # and their BLAS backends (OpenBLAS/MKL) otherwise each spin up a thread per
      # core they *think* exists (host count, not the cgroup limit) — oversubscribing
      # one core and adding lock/context-switch overhead with zero speedup. Pin to 1.
      # Must be set as ENV (before Python imports numpy), which is why they live here.
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
      - key: VECLIB_MAXIMUM_THREADS
        value: "1"
      # Distributed rate limiting (utils/ratelimit.py). Internal private-network
      # URL of the free Render Key Value instance "unstructured-alpha-redis"
      # (same Oregon region). No credentials — only reachable inside Render's
      # private network, so safe as a plain value.
      - key: REDIS_URL
        value: redis://red-d9cipkeq1p3s73ben9cg:6379
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      # Stripe — required for Upgrade page, checkout, billing portal, and referral rewards
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_ANNUAL_PRICE_ID
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      # Referral link base URL — Render sets this automatically to the service's public URL.
      # If left unset, referral.py falls back to http://localhost:8501 (wrong in production).
      - key: RENDER_EXTERNAL_URL
        sync: false
      # Anthropic — used by utils/fetchers.py for earnings transcript sentiment scoring
      - key: ANTHROPIC_API_KEY
        sync: false

  # Keep-warm cron — pings the web service every 10 minutes so a free/low-tier
  # Render instance never spins down. Prevents the cold-start "Page not found"
  # flash on shared deep-links. Lightweight (a few HTTP GETs); no DB/API keys.
  # If the web service is already on an always-on paid plan, this is harmless.
  - type: cron
    name: unstructured-alpha-keep-warm
    runtime: python
    rootDir: dashboard
    schedule: "*/10 * * * *"   # every 10 minutes
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.keep_warm
    envVars:
      - key: APP_URL
        value: https://app.unstructuredalpha.com

  # Morning digest cron job — runs at 07:00 ET (12:00 UTC) daily.
  # Scores all signals, detects flips, emails opted-in users.
  # Uses the same DATABASE_URL / RESEND_* env vars as the web service.
  - type: cron
    name: unstructured-alpha-digest
    runtime: python
    rootDir: dashboard
    # Render schedules use UTC. Run at both DST possibilities; send_digest
    # exits unless local New York time is exactly 07:xx.
    schedule: "0 11,12 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_digest
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: APP_BASE_URL
        value: https://app.unstructuredalpha.com
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Day-6 trial-end reminder cron — runs at 10:00 ET (15:00 UTC) daily.
  # Finds Pro users whose 7-day trial ends within the next 20–32 hours
  # and emails them a "trial ends tomorrow" nudge.
  - type: cron
    name: unstructured-alpha-trial-reminder
    runtime: python
    rootDir: dashboard
    schedule: "0 15 * * *"   # 15:00 UTC = 10:00 ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_trial_reminder
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false

  # Webhook alert cron — runs every hour.
  # For every user with a Discord/Slack/generic webhook URL configured,
  # evaluates their watchlist and fires any threshold crossings to their
  # webhook. Duplicate-safe: the alert state table prevents re-firing the
  # same crossing more than once. Only needs DATABASE_URL + the signal data
  # APIs (FRED/EIA) — no email sending.
  - type: cron
    name: unstructured-alpha-webhooks
    runtime: python
    rootDir: dashboard
    schedule: "0 * * * *"   # every hour on the hour
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.fire_webhooks
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Watchlist email alert cron — runs every hour (offset 30 min from webhooks).
  # For every verified user with at least one watchlist entry, evaluates their
  # watchlist and emails them about any threshold crossings. Covers users who
  # have no Discord/Slack webhook configured but still want push notifications.
  # Duplicate-safe: same alert_state table dedup as fire_webhooks.py.
  - type: cron
    name: unstructured-alpha-watchlist-alerts
    runtime: python
    rootDir: dashboard
    schedule: "30 * * * *"   # every hour at :30 (offset from webhook cron)
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_watchlist_alerts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Nightly prediction auto-resolution cron — runs at 02:00 UTC daily.
  # Finds pending predictions whose 4w/8w/12w forward windows have expired,
  # fetches realized prices via yfinance, and marks them correct/incorrect.
  # This powers the public Track Record leaderboard and per-signal accuracy stats.
  - type: cron
    name: unstructured-alpha-resolve-predictions
    runtime: python
    rootDir: dashboard
    schedule: "0 2 * * *"   # 02:00 UTC = 10:00 PM ET (runs overnight, off-peak)
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.resolve_predictions
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # ── Batch scoring: CORE tier ────────────────────────────────────────────────
  # The curated tickers + everything users actually watch, scored with the FULL
  # Confluence Score (include_optional=True) so these snapshots match Ticker Deep
  # Dive exactly. Small tier, so the ~sec/ticker cost of the four differentiator
  # fetches is affordable. 04:10 UTC — after grow-universe, off-peak.
  - type: cron
    name: unstructured-alpha-score-core
    runtime: python
    rootDir: dashboard
    schedule: "10 4 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.score_universe --tier core --budget 250 --deadline-min 40
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: SCORE_MAX_RSS_MB
        value: "430"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"

  # ── Batch scoring: REST tier ────────────────────────────────────────────────
  # The remaining qualifying universe (~5k common stocks), scored macro+momentum
  # only — a DIFFERENT metric, stored as score_kind="macro_momentum" so it can
  # never be mistaken for the full Confluence Score. Rotated in daily slices
  # (1/7th per day) so the whole universe refreshes weekly without a 5k run.
  # A macro_momentum write can never overwrite a same-day "full" row.
  - type: cron
    name: unstructured-alpha-score-rest
    runtime: python
    rootDir: dashboard
    schedule: "40 5 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.score_universe --tier rest --rotate-days 7 --budget 900 --deadline-min 40
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: SCORE_MAX_RSS_MB
        value: "430"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"

  # Daily universe growth — seeds big-cap names across covered industries into
  # the dynamic_universe table and pre-warms each one's Confluence Score snapshot
  # so common tickers load instantly. Runs at 03:00 UTC (after resolve-predictions,
  # still off-peak). Watchlist adds also grow the universe live (utils/universe.py).
  - type: cron
    name: unstructured-alpha-grow-universe
    runtime: python
    rootDir: dashboard
    schedule: "0 3 * * *"   # 03:00 UTC = 11:00 PM ET (off-peak)
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.grow_universe
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Score-movement email cron — runs once daily at 15:30 UTC (11:30 AM ET).
  # For every verified watchlist user, computes current Confluence Score for each
  # watched ticker and compares against last_score_emailed in alert_state. Any
  # ticker that moved ±10+ points since the last emailed baseline triggers a
  # batched notification email. Baseline is updated after each alert so subsequent
  # checks measure movement from the new level, not the original one. First-run
  # for a ticker sets the baseline silently with no email.
  - type: cron
    name: unstructured-alpha-score-moved
    runtime: python
    rootDir: dashboard
    schedule: "30 15 * * *"   # 15:30 UTC = 11:30 AM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_score_moved
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Score Velocity Alert cron — runs once daily at 16:00 UTC (12:00 PM ET).
  # For each user's watchlist, computes rolling score velocity from score_snapshots
  # and emails an alert when a ticker's velocity is in the top 10% of its own history.
  # De-duplication: last_velocity_alert_at in alert_state prevents re-alerting
  # the same (user, ticker) pair within 6 days.
  - type: cron
    name: unstructured-alpha-velocity-alerts
    runtime: python
    rootDir: dashboard
    schedule: "0 16 * * *"   # 16:00 UTC = 12:00 PM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_velocity_alerts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Machine's Best Ideas tweet cron — runs daily at 14:00 UTC (10:00 AM ET).
  # Finds tickers with score ≥ 65 + positive velocity, posts top 5 to Twitter.
  # Separate from signal-flip tweet (13:00 UTC) to avoid resource contention.
  - type: cron
    name: unstructured-alpha-tweet-best-ideas
    runtime: python
    rootDir: dashboard
    schedule: "0 14 * * *"   # 14:00 UTC = 10:00 AM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.tweet_best_ideas
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_TOKEN_SECRET
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Sunday AI Portfolio Brief — runs every Sunday at 15:00 UTC (11:00 AM ET).
  # Sends personalized weekly brief to every Pro user with digest_opted_in=True.
  # Sections: watchlist composite score + week delta, top 3 movers, signal flips 7d,
  # AI "what to watch" paragraph (Haiku), Machine's Best Ideas (top 3, public),
  # referral CTA. Designed as a retention anchor AND a viral acquisition engine.
  - type: cron
    name: unstructured-alpha-weekly-brief
    runtime: python
    rootDir: dashboard
    schedule: "0 15 * * 0"   # 15:00 UTC Sunday = 11:00 AM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_weekly_brief
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false

  # Free subscriber brief cron — runs every Sunday at 16:00 UTC (12:00 PM ET).
  # Fetches the latest macro_narratives row and emails every active contact in
  # the Resend audience (landing page free subscribers). First 3 paragraphs
  # in the email as a preview; full brief lives at stocks.unstructuredalpha.com/brief.
  # Runs one hour after the Pro brief (15:00 UTC) to avoid overlapping DB load.
  # Requires RESEND_AUDIENCE_ID set to the Resend audience ID for the landing page.
  - type: cron
    name: unstructured-alpha-brief-subscribers
    runtime: python
    rootDir: dashboard
    schedule: "0 16 * * 0"   # 16:00 UTC Sunday = 12:00 PM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_brief_subscribers
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_AUDIENCE_ID
        sync: false
      - key: SEO_BASE_URL
        value: "https://stocks.unstructuredalpha.com"
      - key: APP_BASE_URL
        value: "https://unstructuredalpha.com"

  # Day-7 retention email cron — runs daily at 15:00 UTC (11:00 AM ET).
  # Sends "one week in — what the machine is seeing" to users who verified
  # their email 7–8 days ago. Covers: current regime, top 3 tickers by
  # Confluence Score, most notable 7-day signal flip, soft Pro CTA for free users.
  # One-shot per user (guarded by day7_email_sent column on users table).
  - type: cron
    name: unstructured-alpha-onboarding-day7
    runtime: python
    rootDir: dashboard
    schedule: "0 15 * * *"   # 15:00 UTC = 11:00 AM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_onboarding_day7
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Day-3 onboarding email cron — runs daily at 14:00 UTC (10:00 AM ET).
  # Sends "3 features you probably haven't tried yet" to users who verified
  # their email 3–4 days ago. One-shot per user (guarded by day3_email_sent).
  - type: cron
    name: unstructured-alpha-onboarding-day3
    runtime: python
    rootDir: dashboard
    schedule: "0 14 * * *"   # 14:00 UTC = 10:00 AM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_onboarding_day3
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Re-engagement email cron — runs daily at 17:00 UTC (1:00 PM ET).
  # Targets verified users who haven't logged in for >= 5 days, have a watchlist,
  # and haven't been re-engaged within the past 7 days. Sends a "here's what you
  # missed" email with their top watchlist movers + macro signal flips since they
  # were last active. Only sends if there's something substantive to show (>=1 mover
  # or flip). Updates last_reengagement_at after every successful send.
  - type: cron
    name: unstructured-alpha-reengagement
    runtime: python
    rootDir: dashboard
    schedule: "0 17 * * *"   # 17:00 UTC = 1:00 PM ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.send_reengagement
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false

  # Twitter/X signal-flip tweet cron — runs once daily at 13:00 UTC (9:00 AM ET).
  # Computes the current macro signal state, detects flips since yesterday, and
  # tweets a briefing via @UnstructuredAlpha. Requires Twitter API v2 credentials
  # (OAuth 1.0a user context) set as Render env vars — never commit key values.
  - type: cron
    name: unstructured-alpha-tweet-flips
    runtime: python
    rootDir: dashboard
    schedule: "0 13 * * *"   # 13:00 UTC = 09:00 ET
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.tweet_signal_flips
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_TOKEN_SECRET
        sync: false

  # Signal flip email alert cron — runs every 2 hours at :15 past the hour.
  # Detects macro signal status changes (bullish ↔ neutral ↔ bearish) via
  # signal_snapshots table, then emails opted-in watchlist users whose tickers
  # are exposed to the flipped signals. De-duplicated via signal_flip_log table
  # (one alert per signal per calendar day max). Offset at :15 to avoid
  # contention with the hourly watchlist-alerts cron that runs at :30.
  - type: cron
    name: unstructured-alpha-signal-flip-alerts
    runtime: python
    rootDir: dashboard
    schedule: "15 */2 * * *"   # every 2 hours at :15 past the hour
    buildCommand: pip install -r requirements.txt
    startCommand: python -m cron.signal_flip_alerts
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false

  # SEO web service — FastAPI app that renders server-side HTML pages for
  # individual tickers (/ticker/NVDA), macro signals (/signal/ata_trucking),
  # and a daily signal report (/signals/report). Streamlit cannot serve
  # Google-crawlable HTML; this service fills that gap.
  #
  # After deploying, point seo.unstructuredalpha.com at this service in the
  # Render dashboard, then set SEO_BASE_URL to match.
  # Submit /sitemap.xml to Google Search Console.
  - type: web
    name: unstructured-alpha-seo
    runtime: python
    plan: starter
    rootDir: dashboard
    buildCommand: pip install -r requirements.txt
    startCommand: "sh -c 'PYTHONPATH=/opt/render/project/src/dashboard python -m uvicorn seo.main:app --host 0.0.0.0 --port $PORT'"
    healthCheckPath: /healthz   # liveness — no deps (readiness is /readyz)
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: EIA_API_KEY
        sync: false
      # Single-core box: pin BLAS/numeric threads to 1 (see the web service block).
      - key: OMP_NUM_THREADS
        value: "1"
      - key: OPENBLAS_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: NUMEXPR_NUM_THREADS
        value: "1"
      - key: VECLIB_MAXIMUM_THREADS
        value: "1"
      # So /readyz can report Redis health accurately from this service too.
      - key: REDIS_URL
        value: redis://red-d9cipkeq1p3s73ben9cg:6379
      # Canonicals, sitemap entries, robots and internal links all derive from
      # this. It must be the APEX domain, not seo.*, because Next.js rewrites
      # (unstructured-alpha-web/next.config.ts) now proxy /ticker/*, /signal/*,
      # /signals/report, /sitemap.xml and /robots.txt from www to this service.
      #
      # Previously these 329 pages were only reachable at seo.unstructuredalpha.com
      # while www 404'd on the same paths and served no robots.txt or sitemap at
      # all — /sitemap.xml on www returned the Next.js HTML shell, which Google
      # rejects outright. Ranking signals accrued to a subdomain nobody links to
      # instead of compounding on the brand domain.
      #
      # If this is left pointing at seo.* while the rewrites are live, every
      # proxied page would carry a canonical back to the subdomain and the
      # consolidation would achieve nothing.
      - key: SEO_BASE_URL
        value: "https://www.unstructuredalpha.com"
      - key: APP_URL
        value: "https://unstructuredalpha.com"
